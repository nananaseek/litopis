services:
  # mongodb:
  #   image: mongo:7
  #   restart: unless-stopped
  #   volumes:
  #     - mongo_data:/data/db
  #   healthcheck:
  #     test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    # environment:
    #   # Якщо в .env задано MONGODB_URL — використовується зовнішня БД; інакше — MongoDB з Docker
    #   - MONGODB_URL=${MONGODB_URL:-mongodb://mongodb:27017}
    #   - MONGODB_DB_NAME=${MONGODB_DB_NAME:-litopis}
    # depends_on:
    #   mongodb:
    #     condition: service_healthy

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - backend

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    depends_on:
      - frontend

volumes:
  mongo_data:
  certbot_conf:
  certbot_www:
